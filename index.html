<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appeal Center</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 16px;
    width: 350px;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 22px;
  }

  input, textarea, select {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
  }

  textarea {
    resize: none;
    height: 80px;
  }

  button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #5865F2;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #4752c4;
    transform: scale(1.03);
  }

  .footer {
    text-align: center;
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.6;
  }
</style>

</head>
<body>

<div class="card">
  <h1>Discord Appeal Center</h1>

  <input placeholder="Discord Username">
  <input placeholder="User ID">

  <select>
    <option>Ban</option>
    <option>Mute</option>
    <option>Kick</option>
    <option>Warning</option>
  </select>

  <textarea placeholder="Why were you punished?"></textarea>
  <textarea placeholder="Why should we remove it?"></textarea>

  <button>Submit Appeal</button>

  <div class="footer">
    Appeals are reviewed by staff within 24–72 hours
  </div>
</div>

</body>
</html>
